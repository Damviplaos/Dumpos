name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install
      - run: npx vite build
      - run: npm install -g @bubblewrap/cli
      - name: Init TWA
        run: |
          mkdir -p twa-project && cd twa-project
          bubblewrap init \
            --manifest "https://dumpos-qm8m5z7kh-damviplaos-projects.vercel.app/manifest.json" \
            --directory . --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: '1'
      - name: Build APK
        run: cd twa-project && bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: '1'
      - uses: actions/upload-artifact@v4
        with:
          name: DumPOS-APK
          path: twa-project/app-release-unsigned.apk
